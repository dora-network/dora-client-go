      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserConfigRequest"
        required: true
      responses:
        "200":
          description: User configuration updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserUpdatedResponse"
        "400":
          description: "Bad request, e.g. invalid query parameters"
