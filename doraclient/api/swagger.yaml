          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
  /user/{id}/orders/stream:
    get:
      summary: "Get a snapshot of user's order updates since a specific time, and\
        \ opens a stream for further updates"
      operationId: getUserOrdersStream
      parameters:
      - name: id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
      - name: since
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: string
          format: date-time
      - name: orderbookIds
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: array
          items:
            type: string
            format: uuid
      responses:
        "200":
          description: User's orders stream
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_6"
        "400":
          description: "Bad request, e.g. invalid query parameters"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "401":
          description: "Unauthorized, user not logged in or does not have access to\
            \ this orderbook"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "404":
          description: User not found or no orders available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
  /user/{id}/ledger/stream:
    get:
      summary: "Get a snapshot of user's ledger updates since a specific time, and\
