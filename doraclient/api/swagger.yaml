  /orderbooks/{id}/stream/open:
    get:
      summary: Get a snapshot of open orders in an order book and open a stream for
        real-time updates
      operationId: streamOrderbookOpenOrders
      parameters:
      - name: id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
      - name: since
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: string
          format: date-time
      responses:
        "200":
          description: Stream opened successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_6"
        "400":
          description: "Bad request, e.g. invalid order book ID format"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "404":
          description: Orderbook not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "500":
