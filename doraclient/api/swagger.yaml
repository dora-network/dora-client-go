  /v1/user/{user_id}/orders/{order_book_id}/stream:
    get:
      summary: "Get a snapshot of user's order updates for the given order book since\
        \ a specific time, and opens a stream for further updates"
      operationId: getUserOrdersStream
      parameters:
      - name: user_id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
      - name: order_book_id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
      - name: since
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: string
          format: date-time
      responses:
        "200":
          description: User's orders stream
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOrdersResponse"
        "400":
          description: "Bad request, e.g. invalid query parameters"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "401":
          description: "Unauthorized, user not logged in or does not have access to\
            \ this orderbook"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "404":
          description: User not found or no orders available
