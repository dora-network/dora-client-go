              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "401":
          description: "Unauthorized, user not logged in or does not have access to\
            \ this ledger"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "404":
          description: User not found or no ledger entries available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
  /user/{id}/transactions/stream:
    get:
      summary: "Get a snapshot of user's executed transactions since a specific time,\
