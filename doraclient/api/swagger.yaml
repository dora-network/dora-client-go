openapi: 3.0.3
info:
  title: DORA
  version: 0.1.0
servers:
- url: https://localhost:8080/v1
  description: local DORA server
paths:
  /assets:
    get:
      summary: List assets
      operationId: listAssets
      parameters:
      - name: created_after
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: string
          format: date-time
      - name: created_before
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: string
          format: date-time
      - name: asset_kind
        in: query
        description: "Asset kind (BOND, CURRENCY, INTEREST, POOL_SHARE)"
        required: false
        style: form
        explode: true
        schema:
          type: string
      - name: can_add_liquidity
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: boolean
      - name: can_direct_borrow
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: boolean
      - name: can_onboard
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: boolean
      - name: can_trade
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: boolean
      - name: can_virtual_borrow
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: boolean
      - name: page
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: integer
          default: 100
      responses:
        "200":
          description: A list of assets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200"
        "400":
          description: "Bad request, e.g. invalid query parameters"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
  /assets/{id}:
    get:
      summary: Get asset by ID
      operationId: getAssetById
      parameters:
      - name: id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Asset details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_1"
        "400":
          description: "Bad request, e.g. invalid query parameters"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "404":
          description: Asset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
  /assets/{id}/coupons:
    get:
      summary: Get coupons for a bond asset
      operationId: getCouponsByAssetId
      parameters:
      - name: id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
      - name: start
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: string
          format: date-time
      - name: end
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: string
          format: date-time
      - name: page
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: integer
          default: 100
      responses:
        "200":
          description: List of coupons
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_2"
        "400":
          description: "Bad request, e.g. invalid query parameters"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "404":
          description: Asset not found or no coupons available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
  /user/{id}:
    get:
      summary: Get user by ID
      operationId: getUserById
      parameters:
      - name: id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_3"
        "400":
          description: "Bad request, e.g. invalid query parameters"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
    delete:
      summary: Delete user by ID
      operationId: deleteUser
      parameters:
      - name: id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_4"
        "401":
          description: "Unauthorized, only admin can delete users"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "403":
          description: "Forbidden, only admin can delete users"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
  /user/{id}/config:
    put:
      summary: Update user configuration by ID
      operationId: updateUserConfig
      parameters:
      - name: id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserConfigRequest"
        required: true
      responses:
        "200":
          description: User configuration updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_5"
        "400":
          description: "Bad request, e.g. invalid query parameters"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
  /user/{id}/verify:
    put:
      summary: Verify a user by ID
