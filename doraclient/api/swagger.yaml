openapi: 3.0.3
info:
  title: DORA
  version: 1.0.0
servers:
- url: https://localhost:8084
  description: local DORA server
- url: https://dora-staging.fly.dev
  description: DORA staging server
paths:
  /v1/assets:
    get:
      summary: List assets
      operationId: listAssets
      parameters:
      - name: created_after
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: string
          format: date-time
      - name: created_before
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: string
          format: date-time
      - name: asset_kind
        in: query
        description: "Asset kind (BOND, CURRENCY, INTEREST, POOL_SHARE)"
        required: false
        style: form
        explode: true
        schema:
          $ref: "#/components/schemas/AssetKind"
      - name: can_add_liquidity
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: boolean
      - name: can_direct_borrow
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: boolean
      - name: can_onboard
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: boolean
      - name: can_trade
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: boolean
      - name: can_virtual_borrow
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: boolean
      - name: page
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: integer
          default: 100
      responses:
        "200":
          description: A list of assets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAssetsResponse"
        "400":
          description: "Bad request, e.g. invalid query parameters"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
  /v1/assets/{id}:
    get:
      summary: Get asset by ID
      operationId: getAssetById
      parameters:
      - name: id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Asset details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssetByIDResponse"
        "400":
          description: "Bad request, e.g. invalid query parameters"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "404":
          description: Asset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
  /v1/assets/{id}/coupon_payments:
    get:
      summary: Get coupon payments for a bond asset
      operationId: getCouponPaymentsByAssetId
      parameters:
      - name: id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: List of coupon payments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCouponPaymentsResponse"
        "400":
          description: "Bad request, e.g. invalid query parameters"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "404":
          description: Asset not found or no coupon payments available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
  /v1/user/{user_id}:
    get:
      summary: Get user by ID (admin only)
      operationId: getUserById
      parameters:
      - name: user_id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetUserResponse"
        "400":
          description: "Bad request, e.g. invalid query parameters"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
    delete:
      summary: Delete user by ID
      operationId: deleteUser
      parameters:
      - name: user_id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDeletedResponse"
        "401":
          description: "Unauthorized, only admin can delete users"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "403":
          description: "Forbidden, only admin can delete users"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
  /v1/user/self:
    get:
      summary: Get user details for the authenticated user
      operationId: getUserSelf
      parameters: []
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetUserResponse"
        "400":
          description: "Bad request, e.g. invalid query parameters"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
  /v1/user/{user_id}/config:
    put:
      summary: Update user configuration by ID
      operationId: updateUserConfig
      parameters:
      - name: user_id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserConfigRequest"
        required: true
      responses:
        "200":
          description: User configuration updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserUpdatedResponse"
        "400":
          description: "Bad request, e.g. invalid query parameters"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
  /v1/user/config/self:
    put:
      summary: Update user configuration for the authenticated user
