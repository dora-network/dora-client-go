              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
  /orderbooks/{id}/top:
    get:
      summary: Get the top price levels for a specific orderbook (L1 market depth)
      operationId: getOrderbookTop
      parameters:
      - name: id
        in: path
