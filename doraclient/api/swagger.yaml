          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
  /orderbooks/{id}/orders:
    get:
      summary: Get all open orders for a specific orderbook (L3 market depth)
      operationId: getL3Depth
      parameters:
      - name: id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: List of orders for the orderbook
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_6"
        "400":
          description: "Bad request, e.g. invalid query parameters"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "401":
          description: "Unauthorized, user not logged in or does not have access to\
            \ this orderbook"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "404":
          description: Orderbook not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
  /orderbooks/{id}/depth:
    get:
      summary: Get the aggregated price levels for a specific orderbook (L2 market
        depth)
      operationId: getOrderbookDepth
      parameters:
      - name: id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Order book depth data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_11"
        "400":
          description: "Bad request, e.g. invalid query parameters"
          content:
            application/json:
              schema:
