openapi: 3.0.4
info:
  title: DORA
  version: 0.1.0
servers:
- url: https://localhost:8080/v1
  description: local DORA server
paths:
  /assets:
    get:
      summary: List assets
      operationId: listAssets
      parameters:
      - name: created_after
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: string
          format: date-time
      - name: created_before
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: string
          format: date-time
      - name: asset_kind
        in: query
        description: "Asset kind (BOND, CURRENCY, INTEREST, POOLSHARE)"
        required: false
        style: form
        explode: true
        schema:
          type: string
      - name: can_add_liquidity
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: boolean
      - name: can_direct_borrow
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: boolean
      - name: can_onboard
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: boolean
      - name: can_trade
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: boolean
      - name: can_virtual_borrow
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: boolean
      - name: page
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: integer
          default: 100
      responses:
        "200":
          description: A list of assets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200"
    post:
      summary: Create an asset
      operationId: createAsset
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssetReq"
        required: true
      responses:
        "201":
          description: Asset created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_201"
  /assets/{id}:
    get:
      summary: Get asset by ID
      operationId: getAssetById
      parameters:
      - name: id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Asset details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_1"
        "404":
          description: Asset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_404"
    put:
      summary: Update asset by ID
      operationId: updateAsset
      parameters:
      - name: id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAssetReq"
        required: true
      responses:
        "201":
          description: Asset updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_201"
  /user:
    get:
      summary: Get all users (admin only)
      operationId: getUsers
      parameters:
      - name: id
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: string
          format: uuid
      - name: limit
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: integer
          default: 100
      - name: offset
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: integer
          default: 0
      - name: email
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: string
      - name: name
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: string
      responses:
        "200":
          description: A list of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
                x-content-type: application/json
    post:
      summary: Create a new user
      operationId: createUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
        required: true
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOrUpdateResponse"
  /user/{id}:
    get:
      summary: Get user by ID
      operationId: getUserById
      parameters:
      - name: id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
    put:
      summary: Update user by ID (admin only)
      operationId: updateUser
      parameters:
      - name: id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
        required: true
      responses:
        "201":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOrUpdateResponse"
    delete:
      summary: Delete user by ID
      operationId: deleteUser
      parameters:
      - name: id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: User deleted
        "404":
          description: User not found
  /ledger/module:
    get:
      summary: "Get the entire module object, including unborrowed leverage assets\
        \ and total leverage trackers"
      operationId: getLedgerModule
      responses:
        "200":
          description: Leverage module object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeverageModuleResponse"
  /ledger/module/{asset_id}:
    get:
      summary: Get the module object for a single asset ID
      operationId: getLedgerModuleByAsset
      parameters:
      - name: asset_id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Leverage module balance for asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeverageBalanceResponse"
  /ledger/positions/{user_id}:
    get:
      summary: Get a specific user's positions
      operationId: getLedgerPositionsByUserID
      parameters:
      - name: user_id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: User positions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PositionResponse"
  /ledger/balances/{user_id}:
    get:
      summary: "Get a specific user's available, locked, and borrowed assets"
      operationId: getLedgerBalancesByUserID
      parameters:
      - name: user_id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: User balances
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalancesResponse"
  /ledger/value/{user_id}:
    get:
      summary: "Get a specific user's available, locked, and borrowed USD value"
      operationId: getLedgerValueByUserID
      parameters:
      - name: user_id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: User value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserValueResponse"
  /ledger/interest/{user_id}:
    get:
      summary: Get a specific user's interest
      operationId: getLedgerInterestByUserID
      parameters:
      - name: user_id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: User interest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInterestResponse"
  /ledger/positions/self:
    get:
      summary: Get your own positions
      operationId: getLedgerPositionsSelf
      responses:
        "200":
          description: User positions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PositionResponse"
  /ledger/balances/self:
    get:
      summary: "Get your own available, locked, and borrowed assets"
      operationId: getLedgerBalancesSelf
      responses:
        "200":
          description: User balances
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalancesResponse"
  /ledger/value/self:
    get:
      summary: "Get your own available, locked, and borrowed USD value"
      operationId: getLedgerValueSelf
      responses:
        "200":
          description: User value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserValueResponse"
  /ledger/interest/self:
    get:
      summary: Get your own interest
      operationId: getLedgerInterestSelf
      responses:
        "200":
          description: User interest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInterestResponse"
  /ledger/deposit:
    post:
      summary: Deposit assets into your account from the outside world
      operationId: ledgerDeposit
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FundUserRequest"
        required: true
      responses:
        "201":
          description: Deposit successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FundUserResponse"
  /ledger/withdraw:
    post:
      summary: Withdraw assets from your account to the outside world
      operationId: ledgerWithdraw
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FundUserRequest"
        required: true
      responses:
        "201":
          description: Withdraw successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FundUserResponse"
  /ledger/fund:
    post:
      summary: Add or remove funds from a user
      operationId: ledgerFund
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FundUserRequest"
        required: true
      responses:
        "201":
          description: Fund successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FundUserResponse"
  /leverage/liquidation-targets:
    get:
      summary: Get a list of users who are eligible for automatic liquidation
      operationId: getLeverageLiquidationTargets
      responses:
        "200":
          description: List of liquidation targets
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                  format: uuid
                x-content-type: application/json
  /leverage/supply:
    post:
      summary: Supply leverage for a specific asset
      operationId: leverageSupply
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplyRequest"
        required: true
      responses:
        "201":
          description: Supply successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplyResponse"
  /leverage/withdraw:
    post:
      summary: Withdraw leverage for a specific asset
      operationId: leverageWithdraw
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawRequest"
        required: true
      responses:
        "201":
          description: Withdraw successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WithdrawResponse"
  /leverage/borrow:
    post:
      summary: Directly borrow assets
      operationId: leverageBorrow
      requestBody:
        content:
          application/json:
            schema:
              type: object
        required: true
      responses:
        "201":
          description: Borrow successful
          content:
            application/json:
              schema:
                type: object
                x-content-type: application/json
  /leverage/repay:
    post:
      summary: Repay borrowed assets
      operationId: leverageRepay
      requestBody:
        content:
          application/json:
            schema:
              type: object
        required: true
      responses:
        "201":
          description: Repay successful
          content:
            application/json:
              schema:
                type: object
                x-content-type: application/json
  /liquidity/pool/{pool_id}/add:
    post:
      summary: Add liquidity to a pool
      operationId: liquidityAdd
      parameters:
      - name: pool_id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LiquidityRequest"
        required: true
      responses:
        "201":
          description: Liquidity added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiquidityResponse"
  /liquidity/pool/{pool_id}/subtract:
    post:
      summary: Subtract liquidity from a pool
      operationId: liquiditySubtract
      parameters:
      - name: pool_id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LiquidityRequest"
        required: true
      responses:
        "201":
          description: Liquidity subtracted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiquidityResponse"
  /transactions:
    get:
      summary: "Get a filtered, paginated list of transactions"
      operationId: getTransactions
      parameters:
      - name: pools
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: array
          items:
            type: string
      - name: user_ids
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: array
          items:
            type: string
            format: uuid
      - name: tx_kinds
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: array
          items:
            type: string
      - name: start
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: string
          format: date-time
      - name: end
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: string
          format: date-time
      - name: page
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: integer
          default: 100
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TransactionResponse"
                x-content-type: application/json
  /transactions/{id}:
    get:
      summary: Get a transaction by ID
      operationId: getTransactionById
      parameters:
      - name: id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Transaction details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResponse"
components:
  schemas:
    Asset:
      type: object
      properties:
        id:
          type: string
          format: uuid
        collateral_weight:
          type: number
        created_at:
          type: string
          format: date-time
        decimals:
          type: integer
        description:
          type: string
        liquidation_threshold:
          type: number
        maturity_id:
          type: string
          format: uuid
          nullable: true
        max_supply:
          type: integer
        max_utilization:
          type: integer
        name:
          type: string
        symbol:
          type: string
        kind:
          type: string
        yield:
          type: number
        can_add_liquidity:
          type: boolean
        can_direct_borrow:
          type: boolean
        can_onboard:
          type: boolean
        can_trade:
          type: boolean
        can_virtual_borrow:
          type: boolean
        bond:
          $ref: "#/components/schemas/Bond"
    Bond:
      type: object
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
        coupon_start_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        final_coupon_at:
          type: string
          format: date-time
          nullable: true
        isin:
          type: string
        issued_at:
          type: string
          format: date-time
        issuer:
          type: string
        maturity_at:
          type: string
          format: date-time
        payments_per_year:
          type: integer
    CreateAssetReq:
      type: object
      properties:
        collateral_weight:
          type: number
        decimals:
          type: integer
        description:
          type: string
        name:
          type: string
        max_supply:
          type: integer
        max_utilization:
          type: integer
        liquidation_threshold:
          type: number
        symbol:
          type: string
        kind:
          type: string
        yield:
          type: number
        capabilities:
          $ref: "#/components/schemas/CreateAssetReq_capabilities"
        bond:
          $ref: "#/components/schemas/CreateBondReq"
    CreateBondReq:
      type: object
      properties:
        kind:
          type: string
        coupon_start_at:
          type: string
          format: date-time
          nullable: true
        final_coupon_at:
          type: string
          format: date-time
          nullable: true
        isin:
          type: string
        issued_at:
          type: string
          format: date-time
        issuer:
          type: string
        maturity_at:
          type: string
          format: date-time
        payments_per_year:
          type: integer
    UpdateAssetReq:
      type: object
      properties:
        collateral_weight:
          type: number
        decimals:
          type: integer
        description:
          type: string
        name:
          type: string
        maturity_id:
          type: string
          format: uuid
        max_supply:
          type: integer
        max_utilization:
          type: integer
        liquidation_threshold:
          type: number
        symbol:
          type: string
        kind:
          type: string
        yield:
          type: number
        capabilities:
          $ref: "#/components/schemas/CreateAssetReq_capabilities"
        bond:
          $ref: "#/components/schemas/UpdateBondReq"
    UpdateBondReq:
      type: object
      properties:
        kind:
          type: string
        coupon_start_at:
          type: string
          format: date-time
          nullable: true
        final_coupon_at:
          type: string
          format: date-time
          nullable: true
        isin:
          type: string
        issued_at:
          type: string
          format: date-time
        issuer:
          type: string
        maturity_at:
          type: string
          format: date-time
        payments_per_year:
          type: integer
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        closed_at:
          type: string
          format: date-time
          nullable: true
        disabled_at:
          type: string
          format: date-time
          nullable: true
        email:
          type: string
        name:
          type: string
        native_asset_id:
          type: string
          format: uuid
        photo_url:
          type: string
        provider:
          type: string
        provider_id:
          type: string
          format: uuid
        roles:
          type: array
          items:
            type: string
        timezone:
          type: string
          description: "User's timezone, e.g., 'America/New_York', or an offset."
        timezone_offset:
          type: integer
          description: timezone offset in seconds
      example:
        closed_at: 2000-01-23T04:56:07.000+00:00
        native_asset_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        provider: provider
        timezone: timezone
        disabled_at: 2000-01-23T04:56:07.000+00:00
        roles:
        - roles
        - roles
        timezone_offset: 0
        name: name
        provider_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        photo_url: photo_url
        email: email
    CreateUserRequest:
      required:
      - email
      - name
      - native_asset_id
      - roles
      type: object
      properties:
        email:
          type: string
        name:
          type: string
        native_asset_id:
          type: string
          format: uuid
        photo_url:
          type: string
        provider:
          type: string
        provider_id:
          type: string
          format: uuid
        roles:
          type: string
        timezone:
          type: string
    UpdateUserRequest:
      type: object
      properties:
        email:
          $ref: "#/components/schemas/UpdateFieldString"
        name:
          $ref: "#/components/schemas/UpdateFieldString"
        native_asset_id:
          $ref: "#/components/schemas/UpdateFieldUUID"
        photo_url:
          $ref: "#/components/schemas/UpdateFieldString"
        provider:
          $ref: "#/components/schemas/UpdateFieldString"
        provider_id:
          $ref: "#/components/schemas/UpdateFieldUUID"
        roles:
          $ref: "#/components/schemas/UpdateFieldString"
        timezone:
          $ref: "#/components/schemas/UpdateFieldString"
        verified_at:
          $ref: "#/components/schemas/UpdateFieldDateTime"
      description: "Request body for PUT /user/{id} (admin-only): update a user's\
        \ details."
    CreateOrUpdateResponse:
      type: object
      properties:
        id:
          type: string
          description: The ID of the created or updated user.
          format: uuid
      description: "Response body for POST /user or PUT /user/{id}: contains the ID\
        \ of the created or updated user."
      example:
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
    UpdateFieldString:
      type: object
      properties:
        update:
          type: boolean
          description: Whether to update the field.
        value:
          type: string
          description: The new value to set for the field.
      description: A generic struct to handle optional updates for string fields in
        user requests.
    UpdateFieldUUID:
      type: object
      properties:
        update:
          type: boolean
          description: Whether to update the field.
        value:
          type: string
          description: The new value to set for the field.
          format: uuid
      description: A generic struct to handle optional updates for UUID fields in
        user requests.
    UpdateFieldDateTime:
      type: object
      properties:
        update:
          type: boolean
          description: Whether to update the field.
        value:
          type: string
          description: The new value to set for the field.
          format: date-time
      description: A generic struct to handle optional updates for date-time fields
        in user requests.
    PositionResponse:
      type: object
      properties:
        position:
          type: object
      example:
        position: {}
    BalancesResponse:
      type: object
      properties:
        balances:
          type: array
          items:
            type: object
      example:
        balances:
        - {}
        - {}
    UserValueResponse:
      type: object
      properties:
        available:
          type: object
          additionalProperties:
            type: string
        locked:
          type: object
          additionalProperties:
            type: string
        borrowed:
          type: object
          additionalProperties:
            type: string
      example:
        available:
          key: available
        locked:
          key: locked
        borrowed:
