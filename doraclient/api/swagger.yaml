      type: object
      properties:
        asset_id:
          type: string
          format: uuid
        seq:
          type: integer
        available:
          type: string
          description: The available balance in the module for this asset
          format: decimal
        supplied:
          type: string
          description: The total amount supplied to the module for this asset
          format: decimal
        supplied_collateral:
          type: string
          description: The amount supplied as collateral from user balances in the
            module for this asset
          format: decimal
        virtual:
          type: string
          description: "Assets minted by virtual-borrowing, but not yet repaid"
          format: decimal
        borrowed:
          type: string
          description: The total amount borrowed from the supplied but not yet repaid
