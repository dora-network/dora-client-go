        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
  /orders:
    get:
      summary: List all orders
      operationId: listOrders
      parameters:
      - name: orderbook_id
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: array
          items:
            type: string
            format: uuid
      - name: kind
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: string
          enum:
          - LIMIT
          - MARKET
      - name: status
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: string
          enum:
          - OPEN
          - CLOSED
          - CANCELED
      - name: side
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: string
          enum:
          - BUY
          - SELL
      - name: from
        in: query
        required: false
        style: form
        explode: true
        schema:
