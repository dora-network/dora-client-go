      operationId: getUserTransactionsStream
      parameters:
      - name: id
        in: path
        required: true
        style: simple
        explode: false
        schema:
          type: string
          format: uuid
      - name: since
        in: query
        required: false
        style: form
        explode: true
        schema:
          type: string
          format: date-time
      responses:
        "200":
          description: User's transactions stream
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/inline_response_200_8"
        "400":
          description: "Bad request, e.g. invalid query parameters"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "401":
          description: "Unauthorized, user not logged in or does not have access to\
            \ this transactions"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "404":
          description: User not found or no transactions available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
  /orderbooks:
