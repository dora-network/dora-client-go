          type: string
          format: decimal
        kind:
          type: string
        side:
          type: string
          description: "Required: Must be either 'BUY' or 'SELL'"
        order_book_id:
          type: string
          description: "Required: the order book to submit the order to"
          format: uuid
        user_text:
          type: string
          description: "Optional: User-defined text for the order, e.g., 'buying dips'"
          nullable: true
        order_modifiers:
          type: array
          items:
            type: string
    OrderId:
      type: object
      properties:
        id:
          type: string
          format: uuid
      example:
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
    PositionResponse:
      type: object
      properties:
        portfolio:
          $ref: "#/components/schemas/Portfolio"
    Portfolio:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        position:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              type: object
              additionalProperties:
                $ref: "#/components/schemas/Position"
        net_stablecoin_equivalence:
          $ref: "#/components/schemas/TransformedAssets"
    Position:
      type: object
      properties:
        id:
          type: string
          description: "The unique identifier for the position. Used, for example,\
            \ when creating an order from a position, or deciding collateral should\
            \ be transferred from position A to position B."
          format: uuid
        asset_id:
          type: string
          format: uuid
        seq:
          type: integer
        is_global:
          type: boolean
        available:
          type: string
          description: "The available balance in the position for this asset that\
            \ are not locked, supplied, or used as collateral"
          format: decimal
        locked:
          type: string
          description: "The balance that has been reserved for a current order. If\
            \ spent by the order, they are removed. If the order is cancelled, they\
            \ are returned to the position's available balance."
          format: decimal
        supplied:
          type: string
          description: The balance that user has supplied to the leverage module.
            The user remains entitled to these assets and can withdraw them into their
            available balance.
          format: decimal
        collateral:
          type: string
          description: "The balance that has been locked or supplied, but are marked\
            \ as collateral to support borrow limits and can be consumed in case of\
            \ liquidation. When unmarked as collateral, the balance returns to the\
            \ available balance."
          format: decimal
        supplied_collateral:
          type: string
          description: "The balance that have been supplied to the leverage module\
            \ and marked as collateral. The user remains entitled to this balance\
            \ and can withdraw it into the collateral balance, or unmark them as collateral\
            \ and move them to the supplied balance."
          format: decimal
        borrowed:
          type: string
          description: "The total amount of debt outstanding for this position. The\
            \ position's collateral + supplied_collateral must support a borrow limit\
            \ sufficient to cover all borrowed assets. This position cannot be closed\
            \ until all debt is fully repaid, i.e. borrowed = 0."
          format: decimal
        impending_borrows:
          type: string
          description: "The equivalent of locked balances, but for leveraged orders.\
            \ If a user has an active order that would borrow assets as part of its\
            \ input, then their borrow limit must be reduced until the order is executed\
            \ or cancelled."
          format: decimal
    TransformedAssets:
      type: object
      properties:
        gained:
          type: object
          additionalProperties:
            type: string
            format: decimal
          description: Assets that have been gained by stablecoin equivalence transformations.
            They cannot be withdrawn from the platform until converted back to the
            original asset.
        lost:
          type: object
          additionalProperties:
            type: string
            format: decimal
          description: Assets that have been lost by stablecoin equivalence transformations.
            They can be recovered by converting back any assets gained by stablecoin
            equivalence transformations.
    BalancesResponse:
      type: object
      properties:
        balances:
          type: array
          items:
            $ref: "#/components/schemas/Position"
    UserValueResponse:
      type: object
      properties:
        available:
          type: object
          additionalProperties:
            type: string
        locked:
          type: object
          additionalProperties:
            type: string
        borrowed:
          type: object
          additionalProperties:
            type: string
    UserInterestResponse:
      type: object
      properties:
        available:
          type: object
          additionalProperties:
            type: integer
        value:
          type: object
          additionalProperties:
            type: string
    LeverageModuleResponse:
      type: object
