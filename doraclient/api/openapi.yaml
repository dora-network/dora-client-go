      operationId: cancelAllOpenOrders
      parameters:
      - explode: true
        in: query
        name: order_book_id
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: user_id
        required: false
        schema:
          format: uuid
          type: string
        style: form
      - explode: true
        in: query
