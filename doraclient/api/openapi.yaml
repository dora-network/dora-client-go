          type: array
        style: form
      - explode: true
        in: query
        name: side
        required: false
        schema:
          $ref: "#/components/schemas/Side"
        style: form
      - explode: true
        in: query
        name: from
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - explode: true
        in: query
        name: to
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 100
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOrdersResponse"
          description: A list of orders
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: "Bad request, e.g. invalid query parameters"
        "401":
