              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: No orders found
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: Internal server error
      summary: List all orders
    post:
      operationId: createOrder
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOrderResponse"
          description: Order created
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: "Bad request, e.g. missing required fields"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: "Unauthorized, user not logged in or does not have access to\
            \ this orderbook"
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: Internal server error
      summary: Create a new order
  /v1/orders/validate:
    post:
      operationId: validateSubmitOrder
      requestBody:
        content:
          application/json:
            schema:
