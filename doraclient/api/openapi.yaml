openapi: 3.0.3
info:
  title: DORA
  version: 1.0.0
servers:
- description: local DORA server
  url: https://localhost:8084
- description: DORA staging server
  url: https://dora-staging.fly.dev
- description: local DORA WebSocket server
  url: ws://localhost:8085
security:
- bearerAuth: []
paths:
  /v1/assets:
    get:
      operationId: listAssets
      parameters:
      - explode: true
        in: query
        name: created_after
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - explode: true
        in: query
        name: created_before
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - description: "Asset kind (BOND, CURRENCY, INTEREST, POOL_SHARE)"
        explode: true
        in: query
        name: asset_kind
        required: false
        schema:
          $ref: "#/components/schemas/AssetKind"
        style: form
      - explode: true
        in: query
        name: can_add_liquidity
        required: false
        schema:
          type: boolean
        style: form
      - explode: true
        in: query
        name: can_direct_borrow
        required: false
        schema:
          type: boolean
        style: form
      - explode: true
        in: query
        name: can_onboard
        required: false
        schema:
          type: boolean
        style: form
      - explode: true
        in: query
        name: can_trade
        required: false
        schema:
          type: boolean
        style: form
      - explode: true
        in: query
        name: can_virtual_borrow
        required: false
        schema:
          type: boolean
        style: form
      - explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          type: integer
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 100
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAssetsResponse"
          description: A list of assets
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: "Bad request, e.g. invalid query parameters"
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: Internal server error
      summary: List assets
  /v1/assets/{asset_id}:
    get:
      operationId: getAssetById
      parameters:
      - explode: false
        in: path
        name: asset_id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAssetByIDResponse"
          description: Asset details
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: "Bad request, e.g. invalid query parameters"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: Asset not found
      summary: Get asset by ID
  /v1/assets/{asset_id}/coupon_payments:
    get:
      operationId: getCouponPaymentsByAssetId
      parameters:
      - explode: false
        in: path
        name: asset_id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCouponPaymentsResponse"
          description: List of coupon payments
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: "Bad request, e.g. invalid query parameters"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: Asset not found or no coupon payments available
      summary: Get coupon payments for a bond asset
  /v1/user/{user_id}:
    delete:
      operationId: deleteUser
      parameters:
      - explode: false
        in: path
        name: user_id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDeletedResponse"
          description: User deleted
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: "Unauthorized, only admin can delete users"
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: "Forbidden, only admin can delete users"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseEnvelope"
          description: User not found
      summary: Delete user by ID
    get:
      operationId: getUserById
      parameters:
      - explode: false
        in: path
        name: user_id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
